version: "3.9"

services:
  backend:
    build: ./backend
    container_name: symfony-backend
    networks:
      - symfony-net

  frontend:
    build: ./frontend
    container_name: react-frontend
    networks:
      - symfony-net

  nginx:
    image: nginx:alpine
    container_name: symfony-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - symfony-net
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

networks:
  symfony-net:
    driver: bridge